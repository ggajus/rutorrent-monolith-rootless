name: Build and Push Docker Image

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

concurrency:
  group: docker-${{ forgejo.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ggajus/rutorrent-monolith-rootless
  BUILDX_CACHE_DIR: /buildx-cache/rutorrent-monolith-rootless
  BUILDX_CACHE_NEW_DIR: /buildx-cache/rutorrent-monolith-rootless-new

  # Receives :latest tag, tested to be working
  STABLE_RT_VER: v0.16.11

jobs:
  build:
    name: Build ${{ matrix.arch }}
    if: ${{ forgejo.event_name != 'pull_request' || forgejo.actor == 'gajus' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: docker-amd64
          - arch: arm64
            runner: docker-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker tag
        id: tag
        shell: sh
        run: |
          set -eu
          echo "tag=${IMAGE_NAME}:ci-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        if: forgejo.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare local Buildx cache
        run: |
          mkdir -p "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
          rm -rf "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}"

      - name: Build Docker image
        if: forgejo.ref_type != 'tag'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ steps.tag.outputs.tag }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=local,src=${{ env.BUILDX_CACHE_DIR }}-${{ matrix.arch }}
          cache-to: type=local,dest=${{ env.BUILDX_CACHE_NEW_DIR }}-${{ matrix.arch }},mode=max

      - name: Build and push Docker image by digest
        if: forgejo.ref_type == 'tag'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=local,src=${{ env.BUILDX_CACHE_DIR }}-${{ matrix.arch }}
          cache-to: type=local,dest=${{ env.BUILDX_CACHE_NEW_DIR }}-${{ matrix.arch }},mode=max

      - name: Export digest
        if: forgejo.ref_type == 'tag'
        shell: sh
        run: |
          set -eu
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          digest="${digest#sha256:}"
          touch "/tmp/digests/${digest}"

      - name: Upload digest
        if: forgejo.ref_type == 'tag'
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Promote local Buildx cache
        if: ${{ success() }}
        run: |
          if [ -d "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}" ]; then
            rm -rf "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
            mv "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}" "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
          fi

  publish:
    name: Publish multi-arch manifest
    if: forgejo.ref_type == 'tag'
    needs:
      - build
    runs-on: docker-amd64

    steps:
      - name: Set Docker channel
        id: channel
        shell: sh
        run: |
          set -eu

          if echo "${{ forgejo.ref_name }}" | grep -Fq -- "-${STABLE_RT_VER}-"; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          else
            echo "channel=unstable" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download digests
        uses: https://code.forgejo.org/forgejo/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Publish manifests
        shell: sh
        run: |
          set -eu

          sources=""
          for digest_file in /tmp/digests/*; do
            digest="$(basename "$digest_file")"
            sources="$sources ${IMAGE_NAME}@sha256:${digest}"
          done

          # shellcheck disable=SC2086
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ forgejo.ref_name }}" \
            -t "${IMAGE_NAME}:${{ steps.channel.outputs.channel }}" \
            $sources

      - name: Inspect published manifests
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ forgejo.ref_name }}"
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.channel.outputs.channel }}"


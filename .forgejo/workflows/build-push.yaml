name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - 'main'

env:
  IMAGE_NAME: ggajus/rutorrent-monolith-rootless
  BUILDX_CACHE_DIR: /buildx-cache/rutorrent-monolith-rootless
  BUILDX_CACHE_NEW_DIR: /buildx-cache/rutorrent-monolith-rootless-new

  # Receives :latest tag, tested to be working
  STABLE_RT_VER: v0.16.11

jobs:
  build:
    name: Build ${{ matrix.arch }}
    if: ${{ forgejo.event_name != 'pull_request' || forgejo.actor == 'gajus' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: docker-amd64
          - arch: arm64
            runner: docker-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker tags
        id: tags
        shell: sh
        run: |
          if [ "${{ forgejo.event_name }}" = "pull_request" ]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:ci-${{ matrix.arch }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${IMAGE_NAME}:${{ forgejo.ref_name }}-${{ matrix.arch }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        if: forgejo.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare local Buildx cache
        run: |
          mkdir -p "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
          rm -rf "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ forgejo.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/${{ matrix.arch }}
          cache-from: type=local,src=${{ env.BUILDX_CACHE_DIR }}-${{ matrix.arch }}
          cache-to: type=local,dest=${{ env.BUILDX_CACHE_NEW_DIR }}-${{ matrix.arch }},mode=max

      - name: Promote local Buildx cache
        if: ${{ forgejo.event_name != 'pull_request' && success() }}
        run: |
          if [ -d "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}" ]; then
            rm -rf "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
            mv "${BUILDX_CACHE_NEW_DIR}-${{ matrix.arch }}" "${BUILDX_CACHE_DIR}-${{ matrix.arch }}"
          fi

  publish:
    name: Publish multi-arch manifest
    if: forgejo.event_name != 'pull_request'
    needs:
      - build
    runs-on: docker-amd64

    steps:
      - name: Set Docker channel
        id: channel
        shell: sh
        run: |
          if echo "${{ forgejo.ref_name }}" | grep -Fq -- "-${STABLE_RT_VER}-"; then
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          else
            echo "channel=unstable" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Publish version manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ forgejo.ref_name }}" \
            "${IMAGE_NAME}:${{ forgejo.ref_name }}-amd64" \
            "${IMAGE_NAME}:${{ forgejo.ref_name }}-arm64"

      - name: Publish channel manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ steps.channel.outputs.channel }}" \
            "${IMAGE_NAME}:${{ forgejo.ref_name }}-amd64" \
            "${IMAGE_NAME}:${{ forgejo.ref_name }}-arm64"

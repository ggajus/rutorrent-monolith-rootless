name: Promote Docker Image

on:
  workflow_dispatch:
    inputs:
      source:
        description: Existing source tag to promote
        required: true
        default: unstable
        type: string
      target:
        description: Target stable tag
        required: true
        default: latest
        type: string

concurrency:
  group: docker-promote-${{ inputs.target }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ggajus/rutorrent-monolith-rootless

jobs:
  promote:
    name: Promote Docker manifest
    runs-on: docker-amd64

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve source digest
        id: source
        shell: sh
        run: |
          set -eu

          source_ref="${IMAGE_NAME}:${{ inputs.source }}"

          digest="$(
            docker buildx imagetools inspect "$source_ref" \
              --format '{{json .Manifest}}' \
            | jq -r '.digest'
          )"

          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "Could not resolve digest for $source_ref" >&2
            exit 1
          fi

          echo "source_ref=$source_ref"
          echo "digest=$digest"
          echo "pinned_ref=${IMAGE_NAME}@${digest}" >> "$GITHUB_OUTPUT"

      - name: Promote manifest
        shell: sh
        run: |
          set -eu

          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ inputs.target }}" \
            "${{ steps.source.outputs.pinned_ref }}"

      - name: Inspect promoted manifest
        shell: sh
        run: |
          set -eu

          docker buildx imagetools inspect "${IMAGE_NAME}:${{ inputs.target }}"
